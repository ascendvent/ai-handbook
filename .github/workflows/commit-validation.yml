name: Commit Message Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          # Skip validation for GitFlow branch merges (develop -> main, etc.)
          if [[ "$HEAD_BRANCH" == "develop" && "$BASE_BRANCH" == "main" ]]; then
            echo "✅ Skipping PR title validation for GitFlow branch merge (develop -> main)"
            exit 0
          fi

          # Skip validation for branch merge PRs with simple branch names as titles
          if [[ "$PR_TITLE" == "develop" || "$PR_TITLE" == "Develop" || "$PR_TITLE" == "main" || "$PR_TITLE" == "Main" ]]; then
            echo "✅ Skipping PR title validation for branch merge: '$PR_TITLE'"
            exit 0
          fi

          # Validate conventional commit format for feature PRs
          echo "🔍 Validating PR title: '$PR_TITLE'"
          echo "$PR_TITLE" | commitlint

      - name: Validate commit messages
        run: |
          # Only validate commits that are new in this PR (not already in base branch)
          MERGE_BASE=$(git merge-base ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          echo "Validating commits from $MERGE_BASE to ${{ github.event.pull_request.head.sha }}"
          npx commitlint --from $MERGE_BASE --to ${{ github.event.pull_request.head.sha }} --verbose